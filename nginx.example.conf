# /etc/nginx/sites-available/kira — nümunə (domen: kira.ao.az)
# upstream portu backend/.env → UVICORN_PORT ilə eyni olmalıdır (default 8001)
#
# Köhnə layihənizdə: location /api/ + proxy_pass http://127.0.0.1:8002; (sonda / YOX)
#   → backend-ə URI olduğu kimi gedirdi (/api/...). FastAPI orada /api altında idi.
#
# Bu layihədə: brauzer /api/v1/... çağırır, FastAPI isə /auth, /documents (prefiks yox).
#   Ona görə proxy_pass SONDA / olmalıdır ki, /api/v1 kəsilinsin. Köhnə sxemi birbaşa
#   köçürməyin — 404 alarsınız (əksər halda).
#
# Frontend: VITE_API_BASE_URL=/api/v1
# backend/.env: ROOT_PATH boş

upstream kira_api {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    # Yalnız IP ilə test: server_name _;
    server_name kira.ao.az;

    root /var/www/kira/html;
    index index.html;

    client_max_body_size 20m;

    location /api/v1/ {
        proxy_pass http://kira_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
